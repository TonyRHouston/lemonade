name: Monitor Self-Hosted Runners
on:
  workflow_dispatch: {}
permissions:
  actions: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - name: Get list of runners
      id: runners
      run: "# Try to get repo-level runners first\ncurl -s \\\n  -H \"Authorization:\
        \ token ${{ secrets.GITHUB_TOKEN }}\" \\\n  https://api.github.com/repos/${{\
        \ github.repository }}/actions/runners \\\n  > repo_runners.json\n\n# Also\
        \ get org-level runners\ncurl -s \\\n  -H \"Authorization: token ${{ secrets.GITHUB_TOKEN\
        \ }}\" \\\n  https://api.github.com/orgs/${{ github.repository_owner }}/actions/runners\
        \ \\\n  > org_runners.json\n\n# Combine and deduplicate runner names\nrepo_names=$(jq\
        \ -r '.runners[]?.name // empty' repo_runners.json 2>/dev/null || echo \"\"\
        )\norg_names=$(jq -r '.runners[]?.name // empty' org_runners.json 2>/dev/null\
        \ || echo \"\")\n\n# Fallback to known runner list if API fails\nknown_runners=\"\
        jfowers-stx-01,jfowers-stx-02,sjlab-stx-halo-06,sjlab-stx-halo-07,sjlab-stx-halo-08,sjlab-stx-halo-09,sjlab-stx-halo-10,sjlab-stx-halo-11,sjlab-stx-halo-12,sjlab-stx-halo-13,sjlab-stx-0\"\
        \n\nif [ -n \"$repo_names\" ] || [ -n \"$org_names\" ]; then\n  all_names=$(echo\
        \ -e \"$repo_names\\n$org_names\" | sort -u | tr '\\n' ',' | sed 's/,$//')\n\
        \  echo \"names=$all_names\" >> $GITHUB_OUTPUT\n  echo \"Using API discovered\
        \ runners: $all_names\"\nelse\n  echo \"names=$known_runners\" >> $GITHUB_OUTPUT\n\
        \  echo \"Using fallback runner list: $known_runners\"\nfi\n"
    - name: Get artifacts
      id: artifacts
      run: "curl -s \\\n  -H \"Authorization: token ${{ secrets.GITHUB_TOKEN }}\"\
        \ \\\n  https://api.github.com/repos/${{ github.repository }}/actions/artifacts\
        \ \\\n  > artifacts.json\n"
    - name: Check each runner heartbeat
      id: check
      run: "missing=\"\"\nnow=$(date -u +%s)\n\nfor r in $(echo \"${{ steps.runners.outputs.names\
        \ }}\" | tr ',' ' '); do\n  [ -z \"$r\" ] && continue\n  echo \"Checking $r\"\
        \n\n  ts=$(jq -r --arg r \"$r\" '[.artifacts[] | select(.name==\"heartbeat-\"\
        +$r)] | sort_by(.updated_at) | last | .updated_at // empty' artifacts.json)\n\
        \n  if [ -z \"$ts\" ] || [ \"$ts\" == \"null\" ]; then\n    echo \"No heartbeat\
        \ found for $r\"\n    missing=\"$missing $r\"\n    continue\n  fi\n\n  hb=$(date\
        \ -d \"$ts\" +%s)\n  diff=$((now - hb))\n\n  if [ $diff -gt 691200 ]; then\
        \   # 8 days (weekly + 1 day buffer)\n    echo \"Heartbeat stale for $r (last\
        \ seen: $ts)\"\n    missing=\"$missing $r\"\n  fi\ndone\n\necho \"missing=$missing\"\
        \ >> $GITHUB_OUTPUT\n"
    - name: Fail if any runner missing
      if: steps.check.outputs.missing != ''
      run: 'echo "Missing or stale runners: ${{ steps.check.outputs.missing }}"

        exit 1

        '
    - name: Send Teams alert via Power Automate
      if: failure()
      run: "echo \"Sending Teams alert via Power Automate...\"\nresponse=$(curl -s\
        \ -w \"%{http_code}\" -X POST \\\n  -H \"Content-Type: application/json\"\
        \ \\\n  -d '{\n    \"type\": \"AdaptiveCard\",\n    \"version\": \"1.3\",\n\
        \    \"body\": [\n      {\n        \"type\": \"TextBlock\",\n        \"text\"\
        : \"\u26A0\uFE0F Self-hosted Runner Alert\",\n        \"weight\": \"bolder\"\
        ,\n        \"size\": \"medium\",\n        \"color\": \"attention\"\n     \
        \ },\n      {\n        \"type\": \"TextBlock\",\n        \"text\": \"The following\
        \ runners are offline or missing heartbeats:\",\n        \"wrap\": true\n\
        \      },\n      {\n        \"type\": \"TextBlock\",\n        \"text\": \"\
        ${{ steps.check.outputs.missing }}\",\n        \"wrap\": true,\n        \"\
        fontType\": \"monospace\"\n      }\n    ]\n  }' \\\n  \"${{ secrets.TEAMS_WEBHOOK_URL\
        \ }}\")\n\nhttp_code=\"${response: -3}\"\nresponse_body=\"${response%???}\"\
        \n\necho \"HTTP Status: $http_code\"\necho \"Response: $response_body\"\n\n\
        \nif [ \"$http_code\" != \"200\" ] && [ \"$http_code\" != \"202\" ]; then\n\
        \  echo \"Power Automate webhook failed with status $http_code\"\nelse\n \
        \ echo \"Teams alert sent successfully via Power Automate\"\nfi\n"
