name: "Linux Distro Builds \U0001F427"
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  build-linux:
    name: Build on ${{ matrix.distro }}
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - distro: Arch
          image: archlinux:latest
          python: python
        - distro: Debian
          image: debian:trixie
          python: python3
        - distro: Fedora
          image: fedora:latest
          python: python3
    steps:
    - name: Install build dependencies
      run: "set -e\n\nif [ \"${{ matrix.distro }}\" = \"Arch\" ]; then\n  echo \"\
        Updating Arch package database...\"\n  pacman -Syu --noconfirm\n\n  echo \"\
        Installing build dependencies...\"\n  pacman -S --noconfirm --needed \\\n\
        \    base-devel \\\n    cmake \\\n    git \\\n    curl \\\n    openssl \\\n\
        \    zlib \\\n    pkgconf \\\n    python \\\n    python-pip \\\n    ca-certificates\
        \ \\\n    procps-ng\n\nelif [ \"${{ matrix.distro }}\" = \"Debian\" ]; then\n\
        \  echo \"Updating Debian package database...\"\n  apt-get update\n\n  echo\
        \ \"Installing build dependencies...\"\n  apt-get install -y \\\n    build-essential\
        \ \\\n    g++ \\\n    cmake \\\n    git \\\n    curl \\\n    libcurl4-openssl-dev\
        \ \\\n    libssl-dev \\\n    zlib1g-dev \\\n    pkg-config \\\n    python3\
        \ \\\n    python3-pip \\\n    python3-venv \\\n    ca-certificates \\\n  \
        \  procps\n\nelif [ \"${{ matrix.distro }}\" = \"Fedora\" ]; then\n  echo\
        \ \"Updating Fedora package database...\"\n  dnf update -y\n\n  echo \"Installing\
        \ build dependencies...\"\n  dnf install -y \\\n    @development-tools \\\n\
        \    gcc-c++ \\\n    cmake \\\n    git \\\n    curl \\\n    libcurl-devel\
        \ \\\n    openssl-devel \\\n    zlib-devel \\\n    pkgconf \\\n    python3\
        \ \\\n    python3-pip \\\n    ca-certificates \\\n    procps-ng\nfi\n\necho\
        \ \"Verifying installations...\"\ncmake --version\ngcc --version\ng++ --version\n\
        pkg-config --version\n${{ matrix.python }} --version\n\necho \"Verifying process\
        \ management tools...\"\ncommand -v pgrep && command -v pkill && command -v\
        \ ps\n\necho \"Verifying SSL certificates...\"\nls -la /etc/ssl/certs/ | head\
        \ -10\n\necho \"Testing HTTPS connectivity...\"\ncurl -sI https://huggingface.co\
        \ | head -5 || echo \"Warning: HTTPS test failed\"\n\necho \"Build dependencies\
        \ installed successfully!\"\n"
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        clean: true
        fetch-depth: 0
    - name: Build C++ Server with CMake
      run: "set -e\n\necho \"Building lemonade-router and lemonade-server on ${{ matrix.distro\
        \ }}...\"\n\ncd src/cpp\n\n# Create build directory\nif [ -d \"build\" ];\
        \ then\n    echo \"Removing existing build directory...\"\n    rm -rf build\n\
        fi\nmkdir build\ncd build\n\n# Configure with Release build type\necho \"\
        Configuring CMake...\"\ncmake .. -DCMAKE_BUILD_TYPE=Release\n\n# Build using\
        \ all available cores\necho \"Building binaries...\"\ncmake --build . -j$(nproc)\n\
        \n# Verify binaries exist\nif [ ! -f \"lemonade-router\" ]; then\n    echo\
        \ \"ERROR: lemonade-router not found!\"\n    echo \"Build directory contents:\"\
        \n    ls -lh\n    exit 1\nfi\n\nif [ ! -f \"lemonade-server\" ]; then\n  \
        \  echo \"ERROR: lemonade-server not found!\"\n    echo \"Build directory\
        \ contents:\"\n    ls -lh\n    exit 1\nfi\n\necho \"Binaries found successfully\"\
        \nls -lh lemonade-router lemonade-server\n\necho \"Verifying binary executability...\"\
        \n./lemonade-router --version\n./lemonade-server --version\n\necho \"${{ matrix.distro\
        \ }} build successful!\"\n"
    - name: Verify system library linking
      run: 'echo "Checking library dependencies..."

        cd src/cpp/build


        echo "=== lemonade-router dependencies ==="

        ldd lemonade-router


        echo ""

        echo "=== lemonade-server dependencies ==="

        ldd lemonade-server


        echo ""

        echo "All dependencies resolved successfully on ${{ matrix.distro }}!"

        '
    - name: Setup Python virtual environment
      run: 'echo "Creating Python virtual environment..."

        ${{ matrix.python }} -m venv .venv


        echo "Activating virtual environment and installing dependencies..."

        . .venv/bin/activate

        pip install --upgrade pip

        pip install -r test/requirements.txt


        echo "Python environment setup complete!"

        '
    - name: Run CLI tests
      env:
        LEMONADE_CI_MODE: True
        PYTHONIOENCODING: utf-8
      run: 'set -e


        . .venv/bin/activate

        SERVER_BINARY="$(pwd)/src/cpp/build/lemonade-server"


        echo "Running CLI tests..."

        python test/server_cli.py --server-binary "$SERVER_BINARY"


        echo "CLI tests PASSED!"

        '
    - name: Run endpoint tests
      env:
        LEMONADE_CI_MODE: True
        PYTHONIOENCODING: utf-8
      run: 'set -e


        . .venv/bin/activate

        SERVER_BINARY="$(pwd)/src/cpp/build/lemonade-server"


        echo "Running endpoint tests..."

        python test/server_endpoints.py --server-binary "$SERVER_BINARY"


        echo "Endpoint tests PASSED!"

        '
