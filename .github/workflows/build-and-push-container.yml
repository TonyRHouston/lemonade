name: Build and Push Container Image
on:
  workflow_dispatch: {}
permissions:
  contents: read
  packages: write
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-server
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Determine tag
      id: tag
      run: "if [ \"${{ github.event_name }}\" = \"push\" ]; then\n  echo \"tag=${GITHUB_REF_NAME}\"\
        \ >> $GITHUB_OUTPUT\nelse\n  echo \"tag=${{ inputs.tag }}\" >> $GITHUB_OUTPUT\n\
        \  git checkout \"refs/tags/${{ inputs.tag }}\"\nfi\n"
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile
        push: true
        tags: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag
          }}

          ${{ github.event_name == ''push'' && format(''{0}/{1}:latest'', env.REGISTRY,
          env.IMAGE_NAME) || '''' }}

          ${{ github.event_name == ''workflow_dispatch'' && inputs.add_latest && format(''{0}/{1}:latest'',
          env.REGISTRY, env.IMAGE_NAME) || '''' }}

          '
